[[profiles]]
name = "quant-books"
source_paths = ["./examples/books"]
file_types = ["pdf"]
parser_mode = "glm-ocr"
target_dataset = "quant-books"
source_type = "book"
enabled = true
max_convert_workers = 1
max_upload_workers = 4
max_parse_workers = 2

[profiles.skip_rules]
path_parts = []
suffixes = []

[[profiles]]
name = "quant-papers"
source_paths = ["./examples/papers"]
file_types = ["pdf", "md"]
parser_mode = "glm-ocr"
target_dataset = "quant-papers"
source_type = "paper"
enabled = true
max_convert_workers = 1
max_upload_workers = 4
max_parse_workers = 2

[profiles.skip_rules]
path_parts = []
suffixes = []

[[profiles]]
name = "quant-articles"
source_paths = ["./examples/articles"]
file_types = ["md"]
parser_mode = "passthrough"
target_dataset = "quant-articles"
source_type = "article"
enabled = true
max_convert_workers = 1
max_upload_workers = 4
max_parse_workers = 2

[profiles.skip_rules]
path_parts = []
suffixes = [".excalidraw.md"]

[[profiles]]
name = "quant-videos"
source_paths = ["./examples/videos"]
file_types = ["md"]
parser_mode = "passthrough"
target_dataset = "quant-videos"
source_type = "video"
enabled = true
max_convert_workers = 1
max_upload_workers = 4
max_parse_workers = 2

[profiles.skip_rules]
path_parts = ["_meta"]
suffixes = [".excalidraw.md"]
